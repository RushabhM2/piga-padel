name: Test

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: test
    runs-on: ubuntu-latest
    container:
      image: node:22-alpine
    steps:
      - uses: actions/checkout@v3
        with:
          node-version: 22
      - run: cd api && npm ci
      - run: cd api && npm test
      - run: cd api && npm run build