name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: node:22-alpine
    steps:
      - uses: actions/checkout@v3
        with:
          node-version: 22
      - run: cd api & npm ci
      - run: cd api & npm test
      - run: npm run build